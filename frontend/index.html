      /* Apply global theme variables */
      body {
        background: linear-gradient(to bottom right, var(--color-background-animated-start), var(--color-background-animated-end));
        background-size: 200% 200%;
        animation: gradientShift 10s ease infinite; /* Apply to body for full page */
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Keyframes for fade-in/scale-up animation */
      @keyframes fadeInScaleUp {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
      }

      .animate-fade-in-scale-up {
        animation: fadeInScaleUp 0.5s ease-out forwards;
      }

      /* Keyframes for gradient animation on form */
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .animate-gradient-shift {
        animation: gradientShift 10s ease infinite;
      }

      /* Keyframes for recording pulse animation */
      @keyframes pulse-record {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.7;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .animate-pulse-record {
        animation: pulse-record 1.5s infinite;
